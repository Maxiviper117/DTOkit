name: PHPStan

on:
  push:
    branches: [main]
    paths: ['**.php', 'composer.json', 'composer.lock', 'phpstan.neon.dist', '.github/workflows/phpstan.yml']
  pull_request:
    paths: ['**.php', 'composer.json', 'composer.lock', 'phpstan.neon.dist', '.github/workflows/phpstan.yml']

permissions:
  contents: read

jobs:
  phpstan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
      - name: Add PHP problem matcher
        run: echo "::add-matcher::${{ runner.tool_cache }}/php.json"
      - uses: ramsey/composer-install@v3
      - run: composer analyse -- --error-format=github
