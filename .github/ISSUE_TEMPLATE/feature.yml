name: Feature request
description: Propose a focused typed-boundary capability.
title: "feat: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Boundary problem
      description: Describe the data-boundary problem, not only the desired API.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Include example declarations, input, output, and failure behavior.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: scope
    attributes:
      label: Scope confirmation
      options:
        - label: This concerns transport/boundary data rather than domain or persistence behavior.
          required: true
